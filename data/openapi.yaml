openapi: 3.1.0

info:
  title: Conference CfP Deadline Checker - Admin API
  version: 0.1.0
  description: |
    国内テックカンファレンスの CfP 期限を一元管理するサイトの管理 API。
    管理画面 (運営者) からカンファレンス・カテゴリ・カンパ情報の CRUD と
    サイト再ビルドのキックを行うためのエンドポイント群。

    認証は二段構え:
    1. CloudFront 前段の Lambda@Edge による Basic 認証 (本仕様書の対象外、
       インフラ層で完結)
    2. Laravel セッション + CSRF トークンによる API 自体の保護

    一般公開ページ向けの API はここには含まれない (公開ページは静的 SSG で
    生成されるため、ランタイム API を持たない)。

servers:
  - url: https://{domainName}/admin/api
    description: 本番環境 (独自ドメイン) または CloudFront デフォルトドメイン
    variables:
      domainName:
        default: cfp.example.com
        description: CDK でデプロイ後に確定するドメイン名

tags:
  - name: Health
    description: サーバー稼働確認
  - name: Conferences
    description: カンファレンス情報の CRUD
  - name: Categories
    description: カテゴリ (タグ) マスタの CRUD
  - name: Build
    description: 静的サイトの再ビルドトリガー

# ── セキュリティ ──
# 全エンドポイントが Laravel セッション Cookie を要求する。
# 状態変更系 (POST/PUT/DELETE) はさらに CSRF トークンを要求する。
# Basic 認証は CloudFront/Lambda@Edge 層で完結するため OpenAPI には含めない。
security:
  - sessionCookie: []

paths:
  # ============================================================
  # Health
  # ============================================================
  /health:
    get:
      tags: [Health]
      operationId: healthCheck
      summary: ヘルスチェック
      description: サーバー稼働確認用。認証不要。
      security: []
      responses:
        '200':
          description: 稼働中
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  timestamp:
                    type: string
                    format: date-time

  # ============================================================
  # Conferences
  # ============================================================
  /conferences:
    get:
      tags: [Conferences]
      operationId: listConferences
      summary: カンファレンス一覧取得
      description: |
        全カンファレンス情報を返す。検索・ソート・フィルタ可。
        フィルタは AND 結合 (例: category と status を同時指定すると両方を満たすもののみ取得)。
      parameters:
        - name: q
          in: query
          required: false
          description: 名称・トラック名・概要のいずれかを部分一致検索
          schema:
            type: string
        - name: category
          in: query
          required: false
          description: |
            categories.categoryId を 1 つ指定すると、その ID を含むカンファレンスのみ取得。
            複数指定時は categoryId をカンマ区切り (OR 結合: いずれかを含むものを取得)。
          schema:
            type: string
            example: "0c1f7a40-1e6a-4d52-9b1f-3b5c8a21d301,1d4f2a83-6b48-4f1c-9c8a-7e2b3d4f5a02"
        - name: status
          in: query
          required: false
          description: |
            ライフサイクル状態でフィルタ (Phase 0.5 / Issue #41):
            - published: 公開中。公開フロントエンドにも露出する確定状態
            - draft: 下書き。仮登録 (CfP 期間未確定や LLM 抽出結果のレビュー待ち) で、
              公開フロントエンドには露出しない
            未指定時は両方を返す。未知値は無視して両方を返す (fail-soft)。

            cfpStartDate / cfpEndDate ベースの「応募受付中」フィルタは別途実装予定
            (本コミット時点では未実装)。
          schema:
            type: string
            enum: [draft, published]
        - name: sort
          in: query
          required: false
          description: ソート対象フィールド
          schema:
            type: string
            enum: [cfpEndDate, eventStartDate, cfpStartDate, name, createdAt]
            default: cfpEndDate
        - name: order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Conference'
                  meta:
                    type: object
                    properties:
                      count:
                        type: integer

    post:
      tags: [Conferences]
      operationId: createConference
      summary: カンファレンス新規登録
      security:
        - sessionCookie: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConferenceCreate'
      responses:
        '201':
          description: 作成成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Conference'
        '422':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/CsrfMismatch'

  /conferences/{id}:
    parameters:
      - $ref: '#/components/parameters/UuidPathParam'
    get:
      tags: [Conferences]
      operationId: getConference
      summary: カンファレンス 1 件取得
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Conference'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Conferences]
      operationId: updateConference
      summary: カンファレンス更新
      security:
        - sessionCookie: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConferenceUpdate'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Conference'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/CsrfMismatch'

    delete:
      tags: [Conferences]
      operationId: deleteConference
      summary: カンファレンス削除
      security:
        - sessionCookie: []
          csrfToken: []
      responses:
        '204':
          description: 削除成功
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/CsrfMismatch'

  /conferences/bulk:
    post:
      tags: [Conferences]
      operationId: bulkImportConferences
      summary: カンファレンスを一括インポート
      description: |
        複数件のカンファレンスを一括登録する。初期データ投入や
        一斉移行時の利便性のため。1 リクエストあたり最大 100 件。

        部分失敗時の挙動は all-or-nothing (1 件でも失敗すれば全件
        ロールバック)。失敗時は 422 と各件のエラー詳細を返す。
      security:
        - sessionCookie: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    $ref: '#/components/schemas/ConferenceCreate'
      responses:
        '201':
          description: 全件登録成功
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Conference'
                  meta:
                    type: object
                    properties:
                      created:
                        type: integer
                        description: 登録された件数
        '422':
          description: |
            バリデーション失敗。詳細にどの行 (index) のどのフィールドが
            違反したかを含める。1 件でも失敗すれば全件ロールバック。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                example:
                  value:
                    error:
                      code: VALIDATION_FAILED
                      message: "Bulk import failed at one or more items"
                      details:
                        - field: "data[2].cfpEndDate"
                          rule: required
                        - field: "data[5].officialUrl"
                          rule: url_https
        '403':
          $ref: '#/components/responses/CsrfMismatch'

  # ============================================================
  # Categories
  # ============================================================
  /categories:
    get:
      tags: [Categories]
      operationId: listCategories
      summary: カテゴリ一覧取得
      description: 全カテゴリを displayOrder 昇順で返す。
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'
                  meta:
                    type: object
                    properties:
                      count:
                        type: integer

    post:
      tags: [Categories]
      operationId: createCategory
      summary: カテゴリ新規登録
      security:
        - sessionCookie: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreate'
      responses:
        '201':
          description: 作成成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Category'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/CsrfMismatch'

  /categories/{id}:
    parameters:
      - $ref: '#/components/parameters/UuidPathParam'
    get:
      tags: [Categories]
      operationId: getCategory
      summary: カテゴリ 1 件取得
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Category'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Categories]
      operationId: updateCategory
      summary: カテゴリ更新
      security:
        - sessionCookie: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryUpdate'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Category'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/CsrfMismatch'

    delete:
      tags: [Categories]
      operationId: deleteCategory
      summary: カテゴリ削除
      description: |
        対象 categoryId を参照する conferences が存在する場合は 409 を返す。
        運営者は事前にカンファレンス側のタグ付けを外す必要がある。
      security:
        - sessionCookie: []
          csrfToken: []
      responses:
        '204':
          description: 削除成功
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '403':
          $ref: '#/components/responses/CsrfMismatch'

  # ============================================================
  # Build trigger
  # ============================================================
  /build/trigger:
    post:
      tags: [Build]
      operationId: triggerBuild
      summary: 静的サイトの再ビルドをトリガー
      description: |
        通常はカンファレンス・カテゴリの保存時に自動でビルドが走るが、
        手動で再ビルドしたい場合のためのエンドポイント。
        実行は Amplify Webhook の呼び出しで行う。
      security:
        - sessionCookie: []
          csrfToken: []
      responses:
        '202':
          description: ビルド要求受付完了 (非同期実行)
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    properties:
                      requestedAt:
                        type: string
                        format: date-time
                      message:
                        type: string
                        example: "Build triggered. It typically takes 1-2 minutes to complete."
        '403':
          $ref: '#/components/responses/CsrfMismatch'
        '503':
          description: ビルドサービス未設定 (Amplify Webhook URL が未構成)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /build/status:
    get:
      tags: [Build]
      operationId: getBuildStatus
      summary: 直近のビルド状態を取得
      description: |
        最新の Amplify ビルド状態を取得する。管理画面で「ビルド中…」「失敗」
        などのステータスを表示する用途。

        Amplify の API を Lambda PHP 側で叩き、結果を整形して返す。
        ビルド履歴は最大 10 件まで返却。
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BuildStatus'
                  meta:
                    type: object
                    properties:
                      latestStatus:
                        type: string
                        enum: [PENDING, RUNNING, FAILED, SUCCEED, CANCELLED]
                        description: 最も新しいビルドのステータス
        '503':
          description: ビルドサービス未設定 (Amplify アプリ ID が未構成)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  # ──────────────────────────────────────────────────────────
  # Security Schemes
  # ──────────────────────────────────────────────────────────
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: laravel_session
      description: Laravel セッション Cookie
    csrfToken:
      type: apiKey
      in: header
      name: X-XSRF-TOKEN
      description: |
        CSRF トークン。本プロジェクトでは管理画面 UI を Blade SSR で実装する
        方針 (Issue #9) のため、Blade テンプレート側で `@csrf` ディレクティブや
        `csrf_token()` ヘルパで HTML 内に直接トークンを埋込み、
        AJAX 送信時に X-XSRF-TOKEN ヘッダ経由で送る。
        Origin / Referer ヘッダ検証も併用する (S3 セキュリティ要件)。

  # ──────────────────────────────────────────────────────────
  # Parameters
  # ──────────────────────────────────────────────────────────
  parameters:
    UuidPathParam:
      name: id
      in: path
      required: true
      description: リソース ID (UUID v4)
      schema:
        type: string
        format: uuid
        pattern: '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-4[0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$'

  # ──────────────────────────────────────────────────────────
  # Common Responses
  # ──────────────────────────────────────────────────────────
  responses:
    ValidationError:
      description: 入力値バリデーション失敗
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            multipleFields:
              summary: 複数フィールドのエラー
              value:
                error:
                  code: VALIDATION_FAILED
                  message: "Validation failed for one or more fields"
                  details:
                    - field: cfpEndDate
                      rule: required
                    - field: officialUrl
                      rule: url_https

    NotFound:
      description: 指定 ID のリソースが見つからない
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            example:
              value:
                error:
                  code: NOT_FOUND
                  message: "Resource not found"

    Conflict:
      description: |
        他リソースとの整合性違反。例:
        - カテゴリの slug / name 重複
        - 削除しようとしたカテゴリが他のカンファレンスから参照されている
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            duplicate:
              summary: 重複
              value:
                error:
                  code: DUPLICATE
                  message: "A resource with the same slug already exists"
            inUse:
              summary: 参照中のため削除不可
              value:
                error:
                  code: IN_USE
                  message: "Category is referenced by 3 conferences and cannot be deleted"
                  details:
                    - field: categoryId
                      rule: in_use_by_conferences

    CsrfMismatch:
      description: |
        CSRF トークン不一致 / Origin・Referer 不正のいずれか。
        どちらの違反であっても 403 を返すが、エラーコードで区別可能。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            csrfMismatch:
              summary: CSRF トークン不一致
              value:
                error:
                  code: CSRF_TOKEN_MISMATCH
                  message: "Invalid or missing CSRF token"
            invalidOrigin:
              summary: Origin / Referer ヘッダが管理画面ドメインと一致しない
              value:
                error:
                  code: INVALID_ORIGIN
                  message: "Request origin does not match the admin domain"

  # ──────────────────────────────────────────────────────────
  # Schemas
  # ──────────────────────────────────────────────────────────
  schemas:
    # ── 汎用 Error ──
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: エラー識別コード (機械可読)
              enum:
                - VALIDATION_FAILED
                - NOT_FOUND
                - DUPLICATE
                - IN_USE
                - CSRF_TOKEN_MISMATCH
                - INVALID_ORIGIN
                - INTERNAL_ERROR
                - SERVICE_UNAVAILABLE
            message:
              type: string
              description: 人間可読なエラーメッセージ
            details:
              type: array
              description: フィールドレベルのエラー詳細 (任意)
              items:
                type: object
                required: [field, rule]
                properties:
                  field:
                    type: string
                    description: 該当フィールド名 (camelCase)
                  rule:
                    type: string
                    description: 違反ルール (例 required, url_https, max_length)

    # ── Conference (応答用フル) ──
    Conference:
      type: object
      description: |
        カンファレンス情報。Phase 0.5 (Issue #41) で `status` が導入され、
        Draft (下書き) と Published (公開中) の 2 状態を持つ。

        - **status=published**: 全 9 必須項目 (cfpUrl, eventStartDate, eventEndDate,
          venue, format, cfpEndDate, categories) が非 null として確定している
        - **status=draft**: name + officialUrl + status のみ確実に値があり、
          それ以外は null / 空配列の可能性がある (CfP 期間未確定 / LLM 抽出途中
          / 公開待ち等を表現)

        旧データ (Phase 0.5 導入前に作成された Conference) は status 属性が
        欠落しているが、サーバー側で読み込み時に Published として復元される
        (後方互換)。
      required:
        - conferenceId
        - name
        - officialUrl
        - categories
        - createdAt
        - updatedAt
        - status
      properties:
        conferenceId:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: カンファレンス名 (両状態で必須)
        trackName:
          type: string
          nullable: true
          maxLength: 100
          description: トラック名 (複数 CfP がある場合のみ)
        officialUrl:
          type: string
          format: uri
          pattern: '^https://'
          description: 公式サイト URL (両状態で必須、https のみ)
        cfpUrl:
          type: string
          format: uri
          nullable: true
          pattern: '^https://'
          description: CfP 応募ページ URL (Published で必須、Draft は null 可)
        eventStartDate:
          type: string
          format: date
          nullable: true
          description: 開催開始日 (JST、Published で必須、Draft は null 可)
        eventEndDate:
          type: string
          format: date
          nullable: true
          description: 開催終了日 (JST、Published で必須、Draft は null 可)
        venue:
          type: string
          nullable: true
          minLength: 1
          maxLength: 100
          description: 開催地 (例 "東京", "オンライン"、Published で必須)
        format:
          type: string
          nullable: true
          enum: [online, offline, hybrid]
          description: 開催形式 (Published で必須、Draft は null 可)
        cfpStartDate:
          type: string
          format: date
          nullable: true
          description: CfP 開始日 (両状態で任意。不明時は null)
        cfpEndDate:
          type: string
          format: date
          nullable: true
          description: |
            CfP 締切日 (JST 23:59 を期限とする)。
            Published で必須、Draft は null 可。
        categories:
          type: array
          items:
            type: string
            format: uuid
          description: |
            categories.categoryId の配列。
            Published では minItems: 1 (HTTP 層 FormRequest で検証)、
            Draft では空配列可。
        status:
          type: string
          enum: [draft, published]
          description: |
            ライフサイクル状態 (Phase 0.5 / Issue #41 導入)。
            - draft: 仮登録、公開フロントエンドには露出しない
            - published: 公開中
        description:
          type: string
          nullable: true
          maxLength: 2000
          description: 概要・備考 (HTML 不可、プレーンテキストのみ)
        themeColor:
          type: string
          nullable: true
          pattern: '^#[0-9a-fA-F]{6}$'
          description: HEX カラー (例 "#FF6B6B")
        ttl:
          type: integer
          nullable: true
          readOnly: true
          description: |
            DynamoDB TTL 用 UNIX タイムスタンプ (サーバー側で算出)。
            cfpEndDate の翌日 00:00 JST を UNIX タイムスタンプ化した値。
            cfpEndDate が null の場合 (= Draft で未確定) は ttl も付かないため
            Draft アイテムは TTL による自動削除を受けない。
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    # ── Conference (作成用、ID と日時自動採番) ──
    ConferenceCreate:
      type: object
      required:
        - name
        - officialUrl
      properties:
        status:
          $ref: '#/components/schemas/Conference/properties/status'
          description: |
            省略時は published (= 後方互換)。draft 指定時は cfpUrl 等の
            Published 必須項目を省略可能。
        name:
          $ref: '#/components/schemas/Conference/properties/name'
        trackName:
          $ref: '#/components/schemas/Conference/properties/trackName'
        officialUrl:
          $ref: '#/components/schemas/Conference/properties/officialUrl'
        cfpUrl:
          $ref: '#/components/schemas/Conference/properties/cfpUrl'
        eventStartDate:
          $ref: '#/components/schemas/Conference/properties/eventStartDate'
        eventEndDate:
          $ref: '#/components/schemas/Conference/properties/eventEndDate'
        venue:
          $ref: '#/components/schemas/Conference/properties/venue'
        format:
          $ref: '#/components/schemas/Conference/properties/format'
        cfpStartDate:
          $ref: '#/components/schemas/Conference/properties/cfpStartDate'
        cfpEndDate:
          $ref: '#/components/schemas/Conference/properties/cfpEndDate'
        categories:
          $ref: '#/components/schemas/Conference/properties/categories'
        description:
          $ref: '#/components/schemas/Conference/properties/description'
        themeColor:
          $ref: '#/components/schemas/Conference/properties/themeColor'
      description: |
        Phase 0.5 (Issue #41) で status による条件分岐バリデーションを導入:

        - **status=draft**: name + officialUrl のみ必須 (それ以外はすべて任意)。
          仮登録 (CfP 期間未確定 / LLM 抽出結果のレビュー前 / 公開待ち) を表現。
        - **status=published** (省略時のデフォルト): 従来通り全 9 項目必須
          (cfpUrl, eventStartDate, eventEndDate, venue, format, cfpEndDate,
          categories minItems: 1) + 整合性ルール:
            - cfpStartDate <= cfpEndDate (cfpStartDate 指定時)
            - cfpEndDate <= eventStartDate
            - eventStartDate <= eventEndDate
            - categories の各 ID が categories テーブルに存在

    # ── Conference (更新用、全フィールド任意) ──
    ConferenceUpdate:
      type: object
      description: |
        部分更新 (PATCH 相当) を PUT で許容する。指定されたフィールドのみ更新。

        Phase 0.5 (Issue #41) 後の挙動:
        - status を含めて全フィールドが任意 (sometimes)
        - cfpUrl 等の Published 必須項目は null 許容で送信可能 (Draft 化の途中状態)
        - status='published' で更新すると Published 整合性ルールが適用される
        - status='draft' に変更する操作は技術的に可能だが、運用上は Issue #41 で
          「published → draft 取り下げは当面サポート対象外」としている。
          Admin UI の編集フォームでも下書き保存ボタンから事実上可能なため、
          意図しない取り下げが起きないよう運用側で注意 (将来 UI 抑制を検討)

        整合性ルール (status='published' 更新時):
        - cfpStartDate <= cfpEndDate (cfpStartDate 指定時)
        - cfpEndDate <= eventStartDate
        - eventStartDate <= eventEndDate
        - categories の各 ID が categories テーブルに存在

        サーバー側挙動の注意点:
        - cfpEndDate を更新した場合、サーバーは ttl 属性を再計算する
          (新しい cfpEndDate の翌日 00:00 JST を UNIX タイムスタンプ化)。
          cfpEndDate を null に更新した場合は ttl 属性も外す (= 自動削除されない)。
      properties:
        status:
          $ref: '#/components/schemas/Conference/properties/status'
        name:
          $ref: '#/components/schemas/Conference/properties/name'
        trackName:
          $ref: '#/components/schemas/Conference/properties/trackName'
        officialUrl:
          $ref: '#/components/schemas/Conference/properties/officialUrl'
        cfpUrl:
          $ref: '#/components/schemas/Conference/properties/cfpUrl'
        eventStartDate:
          $ref: '#/components/schemas/Conference/properties/eventStartDate'
        eventEndDate:
          $ref: '#/components/schemas/Conference/properties/eventEndDate'
        venue:
          $ref: '#/components/schemas/Conference/properties/venue'
        format:
          $ref: '#/components/schemas/Conference/properties/format'
        cfpStartDate:
          $ref: '#/components/schemas/Conference/properties/cfpStartDate'
        cfpEndDate:
          $ref: '#/components/schemas/Conference/properties/cfpEndDate'
        categories:
          $ref: '#/components/schemas/Conference/properties/categories'
        description:
          $ref: '#/components/schemas/Conference/properties/description'
        themeColor:
          $ref: '#/components/schemas/Conference/properties/themeColor'

    # ── Category (応答用フル) ──
    Category:
      type: object
      required:
        - categoryId
        - name
        - slug
        - displayOrder
        - createdAt
        - updatedAt
      properties:
        categoryId:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: 表示名 (例 "PHP", "フロントエンド")
        slug:
          type: string
          minLength: 1
          maxLength: 64
          pattern: '^[a-z0-9-]+$'
          description: URL/フィルタ用識別子
        displayOrder:
          type: integer
          description: 表示順 (軸ごとに番号帯を分割した整数値)
        axis:
          type: string
          enum: [A, B, C, D]
          description: 軸ラベル (運用補助。表示には使わない)
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    # ── Category (作成用) ──
    CategoryCreate:
      type: object
      required: [name, slug, displayOrder]
      properties:
        name:
          $ref: '#/components/schemas/Category/properties/name'
        slug:
          $ref: '#/components/schemas/Category/properties/slug'
        displayOrder:
          $ref: '#/components/schemas/Category/properties/displayOrder'
        axis:
          $ref: '#/components/schemas/Category/properties/axis'
      description: |
        - name と slug は既存と重複してはならない (違反は 409)

    # ── Category (更新用) ──
    CategoryUpdate:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/Category/properties/name'
        slug:
          $ref: '#/components/schemas/Category/properties/slug'
        displayOrder:
          $ref: '#/components/schemas/Category/properties/displayOrder'
        axis:
          $ref: '#/components/schemas/Category/properties/axis'

    # ── BuildStatus (Amplify ビルド状態) ──
    BuildStatus:
      type: object
      required: [jobId, status, startedAt]
      properties:
        jobId:
          type: string
          description: GitHub Actions の workflow_run ID
        status:
          type: string
          enum: [PENDING, RUNNING, FAILED, SUCCEED, CANCELLED]
          description: ビルドステータス (GitHub Actions の status / conclusion をマッピング)
        commitId:
          type: string
          description: ビルド対象の Git コミット SHA (リポジトリ連携時のみ)
        commitMessage:
          type: string
          description: コミットメッセージ (リポジトリ連携時のみ)
        startedAt:
          type: string
          format: date-time
          description: ビルド開始日時
        endedAt:
          type: string
          format: date-time
          description: ビルド終了日時 (完了済みのみ)
        triggerSource:
          type: string
          enum: [admin-manual, admin-save, scheduled, repository-push]
          description: |
            ビルド起因の経路:
            - admin-manual: 管理画面の「再ビルド」ボタン
            - admin-save: カンファレンス・カテゴリ等の保存アクション
            - scheduled: EventBridge 日次保険ビルド
            - repository-push: Git リポジトリへの push (本構成では基本未使用)
