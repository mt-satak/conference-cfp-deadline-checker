# admin-api CI / CD ワークフロー (Issue #19 Phase 2/3)
#
# ジョブ構成:
#   check  : Pint lint / PHPStan level max / Pest + 層別カバレッジ判定
#            (PR + push 時に実行、AWS 認証不要)
#   deploy : check 成功後、main への push でのみ実行
#            (OIDC で AssumeRole → CDK で admin-api Lambda + 関連リソース更新)
#
# パスフィルタ:
#   apps/admin-api / packages / docker / infra/cdk / 本ファイル のいずれかに
#   変更が無い場合はワークフロー自体が起動しない
#   (= フロントエンド単独の変更等は素通し)
#
# Phase 1 で必要な GitHub Variables: AWS_DEPLOY_ROLE_ARN
# (CfpDeadlineCheckerCiStack の output から取得した Role ARN)

name: admin-api

on:
  pull_request:
    paths:
      - 'apps/admin-api/**'
      - 'packages/**'
      - 'docker/**'
      - 'infra/cdk/**'
      - '.github/workflows/admin-api.yml'
  push:
    branches: [main]
    paths:
      - 'apps/admin-api/**'
      - 'packages/**'
      - 'docker/**'
      - 'infra/cdk/**'
      - '.github/workflows/admin-api.yml'

# OIDC 経由で AWS にアクセスするため id-token: write が必要 (deploy ジョブ用)。
# contents: read は actions/checkout のため。
permissions:
  id-token: write
  contents: read

# 同一ブランチの古い run はキャンセルする (PR feedback の応答性向上)。
# main は cancel-in-progress を false にしてデプロイを最後まで完了させる。
concurrency:
  group: admin-api-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check:
    name: Lint / PHPStan / Pest + Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin-api

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.5 + xdebug (coverage 用)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: xdebug
          tools: composer:v2
          extensions: mbstring, openssl, json
        env:
          # shivammathur/setup-php に GitHub API を叩かせて rate limit 回避
          fail-fast: 'true'

      - name: Resolve composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-${{ hashFiles('apps/admin-api/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: composer install
        run: composer install --no-progress --no-interaction --prefer-dist

      # ── Lint (Laravel Pint) ──
      # `--test` で書き換えなしの dry-run。違反検出で exit 1。
      - name: Lint (Pint --test)
        run: vendor/bin/pint --test

      # ── 静的解析 (PHPStan level max) ──
      # phpstan.neon の paths/ignoreErrors 設定を使用。
      # app/ ゼロエラー必須、tests/ は構造ノイズ identifier 限定 ignore。
      - name: PHPStan level max
        run: vendor/bin/phpstan analyse --memory-limit=1G --no-progress

      # ── テスト + カバレッジ計測 ──
      # phpunit.xml の <coverage pathCoverage="true"> を有効にしている前提で
      # Pest が C1 (Branch Coverage) を計測する。
      - name: Pest + coverage
        env:
          XDEBUG_MODE: coverage
        run: |
          php -d memory_limit=512M vendor/bin/pest \
            --coverage-html=storage/coverage/html \
            --coverage-text=storage/coverage/coverage.txt \
            --coverage-clover=storage/coverage/clover.xml

      # ── 層別 C1 閾値判定 ──
      # docs/test-strategy.md §2 の閾値表に従い、層別に PASS/FAIL を判定。
      - name: Coverage gate (層別 C1)
        run: php scripts/check-coverage.php storage/coverage/clover.xml

      # ── 失敗時のレポート保全 ──
      # PR で「どの分岐がカバーされていないか」を確認するためにアーティファクト化。
      - name: Upload coverage report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-api-coverage-${{ github.run_id }}
          path: apps/admin-api/storage/coverage/
          retention-days: 7

  deploy:
    name: CDK deploy (main only)
    needs: check
    # main への push 時のみ実行 (PR では発火しない)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── PHP セットアップ ──
      # Lambda 配布物用の composer install (--no-dev) のため。
      # xdebug は不要なので付けない。
      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2
          extensions: mbstring, openssl, json

      - name: Resolve composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-${{ hashFiles('apps/admin-api/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      # 本番 Lambda 用の vendor/ を作る (dev 依存 = pestphp/phpstan/pint 等を除外)。
      - name: composer install --no-dev (Lambda 配布物用)
        working-directory: apps/admin-api
        run: composer install --no-dev --optimize-autoloader --no-progress --no-interaction

      # ── Node + pnpm セットアップ (CDK 用) ──
      # pnpm のバージョンは package.json の `packageManager` から自動解決される。
      # action 側で version を指定すると packageManager と衝突するので渡さない。
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: pnpm install (CDK 等)
        run: pnpm install --frozen-lockfile

      # ── AWS OIDC で短期クレデンシャル取得 ──
      # Phase 1 で構築した GitHubActionsAdminApiDeployRole を assume する。
      # Role ARN は GitHub Variables (リポジトリ Settings → Variables) に登録された
      # AWS_DEPLOY_ROLE_ARN を参照。
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-northeast-1
          role-session-name: github-actions-admin-api-deploy

      # ── CDK deploy ──
      # CfpDeadlineCheckerStack (ap-northeast-1) のみを対象とする。
      # Edge / Ci スタックは別ライフサイクルとして手動 / 別ワークフローで管理。
      # --require-approval never で IAM 等の変更プロンプトを抑止 (CI 前提のため)。
      - name: CDK deploy (CfpDeadlineCheckerStack)
        working-directory: infra/cdk
        run: pnpm cdk deploy --require-approval never CfpDeadlineCheckerStack

      # ── スモークテスト ──
      # Function URL は AWS_IAM 認証なので外部から叩けない (CloudFront + Basic 認証
      # を経由する設計)。ドメイン未設定の現時点では HTTP 経由のスモークが組めない。
      # Phase 4 で smoke test を別 Issue として整理。
      # ここでは "deploy が exit 0 で終わる" ことをもって成功とする。
      - name: Note about smoke test
        run: echo "ℹ Smoke test deferred (Issue #19 Phase 4) — Function URL is IAM-auth only."
