# admin-api CI ワークフロー (Issue #19 → Issue #104 で CI のみに整理)
#
# ジョブ構成:
#   check : Pint lint / PHPStan level max / Pest (no coverage)
#           (PR + push 時に実行、AWS 認証不要)
#
# CD は deploy.yml に集約 (Issue #104 / Phase 5.2)。本ファイルは deploy 責務を持たない。
#
# パスフィルタ:
#   apps/admin-api / packages / docker / 本ファイル のいずれかに変更が無い場合は
#   ワークフロー自体が起動しない (= フロントエンド単独の変更等は素通し)。
#   infra/cdk は cdk.yml が独自に検査するためここでは扱わない。

name: admin-api

on:
  pull_request:
    paths:
      - 'apps/admin-api/**'
      - 'packages/**'
      - 'docker/**'
      - '.github/workflows/admin-api.yml'
  push:
    branches: [main]
    paths:
      - 'apps/admin-api/**'
      - 'packages/**'
      - 'docker/**'
      - '.github/workflows/admin-api.yml'

# CI のみのため `id-token: write` は不要。
permissions:
  contents: read

# 同一ブランチの古い run はキャンセルする (PR feedback の応答性向上)。
# main は cancel-in-progress を false にしてデプロイを最後まで完了させる。
concurrency:
  group: admin-api-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check:
    name: Lint / PHPStan / Pest + Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin-api

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          # CI ではカバレッジ計測しないので xdebug は不要 (Issue #80 D 案)。
          # ローカルの pre-push hook では引き続き xdebug + serial 実行で C1 計測する。
          coverage: none
          tools: composer:v2
          extensions: mbstring, openssl, json
        env:
          # shivammathur/setup-php に GitHub API を叩かせて rate limit 回避
          fail-fast: 'true'

      - name: Resolve composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-${{ hashFiles('apps/admin-api/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: composer install
        run: composer install --no-progress --no-interaction --prefer-dist

      # ── Laravel テスト前提の .env / APP_KEY 生成 ──
      # Laravel 11+ は APP_KEY 未設定だと起動時に MissingAppKeyException で失敗する。
      # CI では .env をコミットしないので .env.example をコピーして key:generate する。
      # phpunit.xml の <php> ブロックの env は .env 読込より優先される (テスト中限定)。
      - name: Prepare .env (Laravel boot 用)
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction --force

      # ── Lint (Laravel Pint) ──
      # `--test` で書き換えなしの dry-run。違反検出で exit 1。
      - name: Lint (Pint --test)
        run: vendor/bin/pint --test

      # ── 静的解析 (PHPStan level max) ──
      # phpstan.neon の paths/ignoreErrors 設定を使用。
      # app/ ゼロエラー必須、tests/ は構造ノイズ identifier 限定 ignore。
      - name: PHPStan level max
        run: vendor/bin/phpstan analyse --memory-limit=1G --no-progress

      # ── テスト実行 (Issue #80 D 案) ──
      # Pest を `--parallel` (Pest 4 内蔵 / ParaTest ベース) で実行。テストの
      # 動作確認のみで coverage は計測しない (= `--no-coverage`)。
      #
      # 経緯: 当初は xdebug coverage で層別 C1 ゲートを CI で判定していたが、
      # Pest --parallel と xdebug coverage の組み合わせで worker 間の
      # compound branch カウントが変動し複数クラスの閾値割れが頻発したため、
      # CI からは coverage 関連を全て撤去し pre-push hook (= serial 実行) に集約。
      # CI でのテスト pass 確認は維持されるため Dependabot 等の自動 PR でも
      # 機能リグレッション検出は担保される。
      - name: Pest (no coverage)
        run: vendor/bin/pest --parallel --no-coverage
