# 共通 deploy ワークフロー (Issue #104 / Phase 5.2)
#
# 目的: admin-api / public-site / infra を 1 つの Stack にデプロイする CD を
#       1 ファイルに集約する。CI (lint / test / typecheck / build 検証) は
#       admin-api.yml / public-site.yml / cdk.yml がそれぞれ独立に担う。
#
# 同一 Stack を複数 workflow から並列に deploy しないために `concurrency: deploy-main`
# でグルーピングし、進行中の deploy を中断しない (`cancel-in-progress: false`)。
#
# build → cdk deploy の順序が固定されているのでビルド手順 (composer no-dev /
# admin-api Vite / public-site Astro) は本ファイル 1 箇所のみ。drift しない。
#
# 必要な GitHub Variables: AWS_DEPLOY_ROLE_ARN
# (Phase 1 で構築した GitHubActionsAdminApiDeployRole の ARN)

name: deploy

on:
  push:
    branches: [main]
    # admin-api / public-site / infra / packages / docker / 本ファイルのいずれかが
    # 変わったら deploy する。lockfile も含める (依存変更で挙動が変わるため)。
    paths:
      - 'apps/admin-api/**'
      - 'apps/public-site/**'
      - 'packages/**'
      - 'docker/**'
      - 'infra/cdk/**'
      - '.github/workflows/deploy.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  # 手動再デプロイ用。Phase 5.3 で admin UI から repository_dispatch を投げる
  # 経路を追加する想定。現時点では UI から発火するルートは未実装。
  workflow_dispatch:
  # ── 毎日 JST 0:00 自動再ビルド (応急処置) ──
  # 公開フロント (Astro SSG) は build 時刻基準で「あと N 日」を計算するため、
  # 再ビルドしないと日付が更新されない。schedule cron で deploy.yml を起動して
  # 毎日 00:00 JST に再ビルド + deploy する。
  # cron 式は UTC 基準なので JST 0:00 = UTC 15:00 (前日)。
  # GitHub Actions の schedule は仕様上 5-10 分の遅延があるため、
  # 0:00-0:10 頃はまだ古い表示が見える残課題あり (= 根本解決は Issue #134
  # クライアント側再計算で対応予定)。
  schedule:
    - cron: '0 15 * * *'

# OIDC で AWS にアクセスするため id-token: write 必須。
permissions:
  id-token: write
  contents: read

# main の deploy は中断せず最後まで走らせる。複数 push が連続で来た場合は
# キューに積まれて順次走る。
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & CDK deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── PHP セットアップ (admin-api Lambda 配布物用) ──
      # CI 用 .env / APP_KEY 生成は不要。`cdk deploy` 時点で artisan を呼ばない。
      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2
          extensions: mbstring, openssl, json

      - name: Resolve composer cache directory
        id: composer-cache
        working-directory: apps/admin-api
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-${{ hashFiles('apps/admin-api/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      # 本番 Lambda 用の vendor/ を作る (dev 依存 = pestphp / phpstan / pint 等を除外)。
      - name: composer install --no-dev (Lambda 配布物用)
        working-directory: apps/admin-api
        run: composer install --no-dev --optimize-autoloader --no-progress --no-interaction

      # ── Node + pnpm セットアップ ──
      # pnpm のバージョンは package.json の `packageManager` から自動解決される。
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: pnpm install (workspace root)
        run: pnpm install --frozen-lockfile

      # ── admin-api Vite ビルド (npm 経由 / Issue #106) ──
      # apps/admin-api/public/build/ を生成する。CDK Stack はこのディレクトリを
      # asset として S3 にアップロードする (PR #99 / eb33f55 で組み込み済)。
      #
      # ここだけ pnpm ではなく npm を使う。理由は workspace 全体で
      # `pnpm.overrides.vite = "^7.3.2"` を設定しているのに対し、admin-api の
      # `laravel-vite-plugin v3.1.0` は peerDependency で `vite ^8.0.0` を要求するため。
      # pnpm 経由だと vite 7 が強制されて laravel-vite-plugin が機能せず、
      # `Could not resolve entry module "index.html"` で fail する。
      #
      # Astro 6 が vite 7 必須なので overrides は外せない。Astro 側の vite 8 移行が
      # できた時点で workspace を vite 8 に統一して npm 混在を解消する (将来 Issue)。
      - name: Build admin-api Vite assets (npm — workspace overrides を bypass)
        working-directory: apps/admin-api
        run: |
          npm install --no-audit --no-fund
          npm run build

      # ── public-site (Astro) ビルド ──
      # apps/public-site/dist/ を生成する。CDK Stack の BucketDeployment が
      # この dist/ を S3 ルートに配信する (Phase 5.1 / Issue #98)。
      #
      # SSG ビルド時に loadConferences / loadCategories が API を fetch する。
      # PUBLIC_API_BASE_URL が空だと mock fallback が走るため (Issue #108)、
      # GitHub Variables に登録した CloudFront URL を build 環境に渡す。
      # ドメイン移行時は Variables の値を書き換えるだけで切替完了。
      - name: Build public-site (Astro)
        env:
          PUBLIC_API_BASE_URL: ${{ vars.PUBLIC_API_BASE_URL }}
        run: pnpm -C apps/public-site run build

      # ── AWS OIDC で短期クレデンシャル取得 ──
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-northeast-1
          role-session-name: github-actions-deploy

      # ── CDK deploy ──
      # CfpDeadlineCheckerStack (ap-northeast-1) のみ。Edge / Ci スタックは
      # 別ライフサイクル (手動 / 別 workflow) で管理する。
      - name: CDK deploy (CfpDeadlineCheckerStack)
        working-directory: infra/cdk
        run: pnpm cdk deploy --require-approval never CfpDeadlineCheckerStack

      # ── スモークテスト (Issue #29) ──
      # cdk deploy 完了後に「実 URL を叩いて 200 + 期待コンテンツが返る」ことを検証。
      # 認証不要の 3 endpoint で構成 (admin /admin/api/health は Basic 認証必須で
      # OIDC Role に SecretsManager 権限が無いため将来別 Issue で追加検討):
      #   1. 公開フロント GET /         → 200 + HTML に "CfP Checker" を含む
      #   2. 公開 API GET /api/public/categories  → 200 + JSON .data が array
      #   3. 公開 API GET /api/public/conferences → 200 + JSON .data が array
      #
      # CloudFront の invalidation 完了 (BucketDeployment が自動発行) と
      # Lambda コールドスタートを吸収するため `curl --retry 5 --retry-delay 10
      # --retry-all-errors` で叩く。最悪 50 秒待ちで失敗確定。
      #
      # docs/test-strategy.md / infra/cdk/README.md に運用ポリシー記載。
      - name: Smoke test (public endpoints)
        env:
          BASE_URL: https://cfp-checker.dev
        run: |
          set -euo pipefail

          retry_curl() {
            curl -fsS \
              --retry 5 --retry-delay 10 --retry-all-errors \
              --max-time 30 \
              "$@"
          }

          echo "▶ 1/3 public site (GET /)"
          retry_curl -o /tmp/index.html -w "HTTP %{http_code}\n" "$BASE_URL/"
          grep -q "CfP Checker" /tmp/index.html \
            || { echo "::error::Public site HTML does not contain expected marker 'CfP Checker'"; exit 1; }

          echo "▶ 2/3 public categories API"
          retry_curl "$BASE_URL/api/public/categories" \
            | jq -e '.data | type == "array"' > /dev/null \
            || { echo "::error::/api/public/categories did not return JSON with .data array"; exit 1; }

          echo "▶ 3/3 public conferences API"
          retry_curl "$BASE_URL/api/public/conferences" \
            | jq -e '.data | type == "array"' > /dev/null \
            || { echo "::error::/api/public/conferences did not return JSON with .data array"; exit 1; }

          echo "✅ All smoke tests passed"
