# 共通 deploy ワークフロー (Issue #104 / Phase 5.2)
#
# 目的: admin-api / public-site / infra を 1 つの Stack にデプロイする CD を
#       1 ファイルに集約する。CI (lint / test / typecheck / build 検証) は
#       admin-api.yml / public-site.yml / cdk.yml がそれぞれ独立に担う。
#
# 同一 Stack を複数 workflow から並列に deploy しないために `concurrency: deploy-main`
# でグルーピングし、進行中の deploy を中断しない (`cancel-in-progress: false`)。
#
# build → cdk deploy の順序が固定されているのでビルド手順 (composer no-dev /
# admin-api Vite / public-site Astro) は本ファイル 1 箇所のみ。drift しない。
#
# 必要な GitHub Variables: AWS_DEPLOY_ROLE_ARN
# (Phase 1 で構築した GitHubActionsAdminApiDeployRole の ARN)

name: deploy

on:
  push:
    branches: [main]
    # admin-api / public-site / infra / packages / docker / 本ファイルのいずれかが
    # 変わったら deploy する。lockfile も含める (依存変更で挙動が変わるため)。
    paths:
      - 'apps/admin-api/**'
      - 'apps/public-site/**'
      - 'packages/**'
      - 'docker/**'
      - 'infra/cdk/**'
      - '.github/workflows/deploy.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  # 手動再デプロイ用。Phase 5.3 で admin UI から repository_dispatch を投げる
  # 経路を追加する想定。現時点では UI から発火するルートは未実装。
  workflow_dispatch:

# OIDC で AWS にアクセスするため id-token: write 必須。
permissions:
  id-token: write
  contents: read

# main の deploy は中断せず最後まで走らせる。複数 push が連続で来た場合は
# キューに積まれて順次走る。
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & CDK deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── PHP セットアップ (admin-api Lambda 配布物用) ──
      # CI 用 .env / APP_KEY 生成は不要。`cdk deploy` 時点で artisan を呼ばない。
      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2
          extensions: mbstring, openssl, json

      - name: Resolve composer cache directory
        id: composer-cache
        working-directory: apps/admin-api
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-${{ hashFiles('apps/admin-api/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      # 本番 Lambda 用の vendor/ を作る (dev 依存 = pestphp / phpstan / pint 等を除外)。
      - name: composer install --no-dev (Lambda 配布物用)
        working-directory: apps/admin-api
        run: composer install --no-dev --optimize-autoloader --no-progress --no-interaction

      # ── Node + pnpm セットアップ ──
      # pnpm のバージョンは package.json の `packageManager` から自動解決される。
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: pnpm install (workspace root)
        run: pnpm install --frozen-lockfile

      # ── admin-api Vite ビルド ──
      # apps/admin-api/public/build/ を生成する。CDK Stack はこのディレクトリを
      # asset として S3 にアップロードする (PR #99 / eb33f55 で組み込み済)。
      # cdk.out のキャッシュ問題は CI ランナーが毎回クリーンなので発生しない。
      - name: Build admin-api Vite assets
        run: pnpm -C apps/admin-api run build

      # ── public-site (Astro) ビルド ──
      # apps/public-site/dist/ を生成する。CDK Stack の BucketDeployment が
      # この dist/ を S3 ルートに配信する (Phase 5.1 / Issue #98)。
      # 公開 API URL は CDK Stack 内の CloudFront 同居経路で解決するため
      # ビルド時 env は不要 (= 同一オリジン /api/public/* 経由)。
      - name: Build public-site (Astro)
        run: pnpm -C apps/public-site run build

      # ── AWS OIDC で短期クレデンシャル取得 ──
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-northeast-1
          role-session-name: github-actions-deploy

      # ── CDK deploy ──
      # CfpDeadlineCheckerStack (ap-northeast-1) のみ。Edge / Ci スタックは
      # 別ライフサイクル (手動 / 別 workflow) で管理する。
      - name: CDK deploy (CfpDeadlineCheckerStack)
        working-directory: infra/cdk
        run: pnpm cdk deploy --require-approval never CfpDeadlineCheckerStack

      # ── スモークテスト placeholder ──
      # Phase 4 で smoke test を別 Issue 化予定 (admin-api.yml と同方針)。
      # YAML block scalar (|) で `#` 文字をシェルに渡す前のコメント切り捨てを防ぐ。
      - name: Note about smoke test
        run: |
          echo "Smoke test deferred (Issue 19 Phase 4) -- Function URL is IAM-auth only."
